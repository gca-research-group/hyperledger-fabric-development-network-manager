output: output/network-with-chaincode
network: network-with-chaincode

chaincodes:
  - &asset
    name: Asset
    version: "1.0"
    path: samples/chaincodes/asset
    language:
      name: golang
      version: "1.26"

  - &product
    name: Product
    version: "1.0"
    path: samples/chaincodes/product

  - &privateagreement
    name: PrivateAgreement
    version: "1.0"
    path: samples/chaincodes/private-agreement
    channelConfigPolicy: Channel/Application/Endorsement
    collectionsConfig: samples/chaincodes/private-agreement/collections_config.json

capabilities:
  channel: V2_0
  orderer: V2_0
  application: V2_5

organizations:
  - name: Org1
    domain: org1.network-with-chaincode.com
    orderers:
      - name: Orderer
        subdomain: orderer
    peers:
      - name: Peer0
        subdomain: peer0
        exposePort: 7051

  - name: Org2
    domain: org2.network-with-chaincode.com
    peers:
      - name: Peer0
        subdomain: peer0
        exposePort: 8051

  - name: Org3
    domain: org3.network-with-chaincode.com
    peers:
      - name: Peer0
        subdomain: peer0
        exposePort: 9051

profiles:
  - &DefaultProfile
    name: DefaultProfile
    organizations:
      - Org1
      - Org2
      - Org3

channels:
  - name: defaultchannel
    profile: *DefaultProfile
    chaincodes:
      - *asset
      - *product
      - *privateagreement
