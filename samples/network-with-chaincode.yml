output: output/network-with-chaincode
network: network-with-chaincode

chaincodes:
  - &asset
    name: Asset
    path: samples/chaincodes/asset/asset.go

  - &product
    name: Product
    path: samples/chaincodes/product/product.go
    signaturePolicy: AND("Org1MSP.peer", "Org2MSP.peer", "Org3MSP.peer")

  - &privateagreement
    name: PrivateAgreement
    path: samples/chaincodes/private-agreement/private-agreement.go
    channelConfigPolicy: Channel/Application/Endorsement
    collectionsConfig: samples/chaincodes/private-agreement/collections_config.json

capabilities:
  channel: V2_0
  orderer: V2_0
  application: V2_5

organizations:
  - name: Org1
    domain: org1.network-with-chaincode.com
    orderers:
      - name: Orderer
        subdomain: orderer
    peers:
      - name: Peer0
        subdomain: peer0

  - name: Org2
    domain: org2.network-with-chaincode.com
    peers:
      - name: Peer0
        subdomain: peer0

  - name: Org3
    domain: org3.network-with-chaincode.com
    peers:
      - name: Peer0
        subdomain: peer0

profiles:
  - &DefaultProfile
    name: DefaultProfile
    organizations:
      - Org1
      - Org2
      - Org3

channels:
  - name: defaultchannel
    profile: *DefaultProfile
    chaincodes:
      - *asset
      - *product
      - *privateagreement
