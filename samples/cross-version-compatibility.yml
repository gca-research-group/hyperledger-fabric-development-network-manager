output: output/cross-version-compatibility
network: cross-version-compatibility

capabilities:
  channel: V2_0
  orderer: V2_0
  application: V2_0

organizations:
  - name: Org1
    domain: org1.cross-version-compatibility.com
    orderers:
      - name: Orderer
        subdomain: orderer
        version: 2.4.7
    peers:
      - name: Peer0
        subdomain: peer0
        version: 2.5.14
    certificateAuthority:
      version: 1.5.15

  - name: Org2
    domain: org2.cross-version-compatibility.com
    peers:
      - name: Peer0
        subdomain: peer0
        version: 2.3.3
    certificateAuthority:
      version: 1.5.8

profiles:
  - &DefaultProfile
    name: DefaultProfile
    organizations:
      - Org1
      - Org2

channels:
  - name: defaultchannel
    profile: *DefaultProfile
