output: output/multi-channel-network-multi-consensus
network: multi-channel-network-multi-consensus

capabilities:
  channel: V3_0
  orderer: V2_0
  application: V2_5

organizations:
  - name: Org1
    domain: org1.multi-channel-network-multi-consensus.com
    orderers:
      - name: Orderer1
        subdomain: orderer1
      - name: Orderer2
        subdomain: orderer2
      - name: Orderer3
        subdomain: orderer3
      - name: Orderer4
        subdomain: orderer4
    peers:
      - name: Peer0
        subdomain: peer0

  - name: Org2
    domain: org2.multi-channel-network-multi-consensus.com
    peers:
      - name: Peer0
        subdomain: peer0

profiles:
  - &BFTProfile
    name: BFTProfile
    organizations:
      - Org1
      - Org2
    consensus:
      type: BFT

  - &RAFTProfile
    name: RAFTProfile
    organizations:
      - Org1
      - Org2
    consensus:
      type: etcdraft

channels:
  - name: bftchannel
    profile: *BFTProfile
  - name: raftchannel
    profile: *RAFTProfile