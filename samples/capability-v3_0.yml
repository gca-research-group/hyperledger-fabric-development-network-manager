output: output/capability-v3_0
network: capability-v3_0

capabilities:
  channel: V3_0
  orderer: V2_0
  application: V2_5

organizations:
  - name: Org1
    domain: org1.capability-v3_0.com
    orderers:
      - name: Orderer
        subdomain: orderer
    peers:
      - name: Peer0
        subdomain: peer0

  - name: Org2
    domain: org2.capability-v3_0.com
    peers:
      - name: Peer0
        subdomain: peer0

profiles:
