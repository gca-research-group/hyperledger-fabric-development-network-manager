output: output/minimal-network
network: minimal-network

capabilities:
  channel: V2_0
  orderer: V2_0
  application: V2_5

organizations:
  - name: Org1
    domain: org1.minimal-network.com
    orderers:
      - name: Orderer
        subdomain: orderer
    peers:
      - name: Peer0
        subdomain: peer0

  - name: Org2
    domain: org2.minimal-network.com
    peers:
      - name: Peer0
        subdomain: peer0

profiles:
  - &DefaultProfile
    name: DefaultProfile
    organizations:

channels:
  - name: defaultchannel
    profile: *DefaultProfile