output: output/two-bootstrap-organizations
network: two-bootstrap-organizations

capabilities:
  channel: V2_0
  orderer: V2_0
  application: V2_5

organizations:
  - name: Org1
    domain: org1.two-bootstrap-organizations.com
    orderers:
      - name: Orderer
        subdomain: orderer
    bootstrap: true
    peers:
      - name: Peer0
        subdomain: peer0
        isAnchor: true

  - name: Org2
    domain: org2.two-bootstrap-organizations.com
    bootstrap: true
    peers:
      - name: Peer0
        subdomain: peer0
        isAnchor: true

profiles:
  - &DefaultProfile
    name: DefaultProfile
    organizations:
      - Org1
      - Org2

channels:
  - name: defaultchannel
    profile: *DefaultProfile