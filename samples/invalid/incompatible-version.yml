output: output/incompatible-version
network: incompatible-version

capabilities:
  channel: V2_0
  orderer: V2_0
  application: V2_5

organizations:
  - name: Org1
    domain: org1.incompatible-version.com
    orderers:
      - name: Orderer
        subdomain: orderer
    peers:
      - name: Peer0
        subdomain: peer0
        versuion: 3.0

  - name: Org2
    domain: org2.incompatible-version.com
    peers:
      - name: Peer0
        subdomain: peer0

profiles:
  - &DefaultProfile
    name: DefaultProfile
    organizations:
      - Org1
      - Org2

channels:
  - name: defaultchannel
    profile: *DefaultProfile